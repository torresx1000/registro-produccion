<!DOCTYPE html>
<html>

<head>
    <title>Cantidad de Pesado de Vitaminas</title>
</head>

<body>

    <h2>CANTIDAD DE PESADO DE VITAMINAS</h2>

    <form method="POST">
        {% csrf_token %}
        <label>Código:</label><br>
        <input type="text" name="codigo" required>
        <br><br>
        <label>Selecciona Prensa o Extrusora:</label><br>
        <select name="prensa" required>
            <option value="">-- Seleccionar --</option>
            <option value="Prensa 1">Prensa 1</option>
            <option value="Prensa 2">Prensa 2</option>
            <option value="Extrusora 1">Extrusora 1</option>
        </select>

        <br><br>

        <label>Pesador 1:</label><br>
        <input type="number" step="0.01" name="pesador1" required>

        <br><br>

        <label>Pesador 2:</label><br>
        <input type="number" step="0.01" name="pesador2" required>

        <br><br>

        <button type="submit">Guardar</button>

    </form>

</body>

</html>
